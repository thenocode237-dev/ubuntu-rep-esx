# Reverse proxy Nginx (V2) — expose les interfaces web derrière un point d'entrée.
# Vhosts par nom d'hôte (évite la réécriture de sous-chemins).
#   - défaut / txadmin.local -> txAdmin (fivem:40120)
#   - grafana.local          -> Grafana (grafana:3000)
#   - adminer.local          -> Adminer (adminer:8080)
# Pour tester en local, mappez ces noms sur l'IP du serveur (hosts) ou utilisez
# l'en-tête Host. Le trafic JEU (30120 TCP/UDP) reste direct : il ne passe PAS
# par Nginx (protocole brut, non HTTP).

# WebSocket : txAdmin et Grafana Live en ont besoin.
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# --- txAdmin (serveur par défaut) -------------------------------------------
server {
    listen 80 default_server;
    server_name _ txadmin.local;

    client_max_body_size 100M;

    location / {
        proxy_pass http://fivem:40120;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        $connection_upgrade;
        proxy_read_timeout 300s;
    }
}

# --- Grafana ----------------------------------------------------------------
server {
    listen 80;
    server_name grafana.local;

    location / {
        proxy_pass http://grafana:3000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        $connection_upgrade;
    }
}

# --- Adminer ----------------------------------------------------------------
server {
    listen 80;
    server_name adminer.local;

    location / {
        proxy_pass http://adminer:8080;
        proxy_set_header Host            $host;
        proxy_set_header X-Real-IP       $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}

