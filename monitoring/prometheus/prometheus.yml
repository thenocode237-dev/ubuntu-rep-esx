# Prometheus (V2) — scrape l'infrastructure du stack FiveM.
global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  # Métriques des conteneurs (CPU/mémoire/réseau/IO par conteneur).
  - job_name: cadvisor
    static_configs:
      - targets: ["cadvisor:8080"]

  # Métriques de l'hôte (CPU/RAM/disque/charge).
  - job_name: node-exporter
    static_configs:
      - targets: ["node-exporter:9100"]
