# Promtail (V2) — collecte les logs des conteneurs Docker et les pousse vers Loki.
server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  # Découverte des conteneurs via le socket Docker.
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 15s
    relabel_configs:
      - source_labels: ["__meta_docker_container_name"]
        regex: "/(.*)"
        target_label: container
      - source_labels: ["__meta_docker_container_log_stream"]
        target_label: stream

  # Logs applicatifs FiveM montés sur l'hôte.
  - job_name: fivem-logs
    static_configs:
      - targets: ["localhost"]
        labels:
          job: fivem-logs
          __path__: /var/log/fivem/*.log
